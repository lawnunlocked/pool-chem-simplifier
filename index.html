<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PoolChem | Professional Calibration</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4 { font-family: 'Lora', serif; }
    
    .bg-mesh {
      background-color: #f8fafc;
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.06) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(219, 234, 254, 0.4) 0px, transparent 80%);
    }
  </style>
</head>

<body class="bg-mesh min-h-screen text-slate-900">

<header class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center">
  <div class="flex items-center gap-2">
    <div class="w-10 h-10 bg-blue-900 rounded-xl flex items-center justify-center text-white font-bold italic shadow-xl">P</div>
    <span class="font-bold tracking-tight text-xl">PoolChem</span>
  </div>
</header>

<section class="pt-12 pb-24 px-6 text-center">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-6">
      Stop guessing.<br>
      Start swimming <span class="text-blue-700 italic">clearer.</span>
    </h1>
    <p class="text-lg text-slate-500 max-w-2xl mx-auto">
      Enter your readings. Get exact chemical dosages and a clear step-by-step plan.
    </p>
  </div>
</section>

<section class="px-4 -mt-10">
  <div class="max-w-xl mx-auto bg-white rounded-3xl shadow-lg p-8">

    <div class="space-y-6">

      <input id="gallons" type="number" placeholder="Pool Size (Gallons)" class="w-full p-4 border rounded-xl text-xl"/>

      <div class="grid grid-cols-2 gap-4">
        <input id="ph" type="number" step="0.1" placeholder="pH" class="p-4 border rounded-xl text-center"/>
        <input id="fc" type="number" step="0.1" placeholder="Chlorine" class="p-4 border rounded-xl text-center"/>
      </div>

      <input id="ta" type="number" placeholder="Alkalinity" class="w-full p-4 border rounded-xl text-xl"/>

      <!-- NEW CYA INPUT -->
      <input id="cya" type="number" placeholder="Stabilizer (CYA)" class="w-full p-4 border rounded-xl text-xl"/>

      <button onclick="calculate()" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold">
        Calculate Plan
      </button>

      <div id="results"></div>

    </div>
  </div>
</section>

<script>
function calculate() {
  const gallons = parseFloat(document.getElementById("gallons").value);
  const ph = parseFloat(document.getElementById("ph").value);
  const fc = parseFloat(document.getElementById("fc").value);
  const ta = parseFloat(document.getElementById("ta").value);
  const cya = parseFloat(document.getElementById("cya").value) || 40;

  if (!gallons || !ph || !fc || !ta) {
    alert("Please fill in your readings.");
    return;
  }

  let actions = [];

  let targetPH = 7.4;
  let targetTA = 100;

  let targetFC = 3;
  if (cya > 30 && cya <= 50) targetFC = 4;
  if (cya > 50 && cya <= 80) targetFC = 5;
  if (cya > 80) targetFC = 6;

  if (ph > 7.6) {
    let dose = (ph - targetPH) * 60 * (gallons / 10000);
    actions.push({
      priority: 1,
      name: "Muriatic Acid",
      dose: `${dose.toFixed(1)} oz`,
      desc: "Lower pH",
      reason: "High pH reduces chlorine effectiveness.",
      link: "#"
    });
  }

  if (fc < targetFC) {
    let dose = (targetFC - fc) * 12.8 * (gallons / 10000);
    actions.push({
      priority: 2,
      name: "Liquid Chlorine",
      dose: `${dose.toFixed(1)} oz`,
      desc: "Sanitize pool",
      reason: `CYA level (${cya}) requires higher chlorine.`,
      link: "#"
    });
  }

  if (ta < 80) {
    let dose = ((targetTA - ta) / 10) * 1.5 * (gallons / 10000);
    actions.push({
      priority: 3,
      name: "Baking Soda",
      dose: `${dose.toFixed(1)} lbs`,
      desc: "Raise alkalinity",
      reason: "Low alkalinity causes unstable pH.",
      link: "#"
    });
  }

  actions.sort((a, b) => a.priority - b.priority);

  let html = "<div class='space-y-4 mt-6'>";

  actions.forEach((a, i) => {
    html += `
      <div class="p-4 border rounded-xl ${i===0 ? 'bg-blue-50 border-blue-200' : ''}">
        <p class="text-sm font-bold">Step ${i+1}: ${a.name}</p>
        <p class="text-2xl font-bold">${a.dose}</p>
        <p class="text-sm text-gray-500">${a.reason}</p>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
