<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PoolChem | Professional Calibration</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4 { font-family: 'Lora', serif; }
    
    .bg-mesh {
      background-color: #f8fafc;
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.04) 0px, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='30' height='30' viewBox='0 0 30 30' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1.5 0V1.5M1.5 30V28.5M0 1.5H1.5M30 1.5H28.5' stroke='%23e2e8f0' stroke-width='0.5'/%3E%3C/svg%3E");
      background-attachment: fixed;
    }
  </style>
</head>

<body class="bg-mesh min-h-screen text-slate-900">

<header class="max-w-6xl mx-auto px-6 py-10 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black text-xl italic">P</div>
    <span class="font-bold tracking-tight text-xl uppercase">PoolChem</span>
  </div>
  <div class="bg-blue-50 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">
    V2.0 Beta
  </div>
</header>

<section class="pt-8 pb-16 px-6">
  <div class="max-w-3xl mx-auto text-center">
    <h1 class="text-5xl md:text-7xl font-black tracking-tighter leading-[0.9] mb-8">
      Crystal Clear Water,<br>
      <span class="text-blue-700 underline decoration-blue-100 underline-offset-8">Zero Guesswork.</span>
    </h1>
    <p class="text-lg text-slate-500 max-w-xl mx-auto leading-relaxed">
      Enter your pool readings below. We'll calculate the exact dosages needed to balance your water perfectly.
    </p>
  </div>
</section>

<section id="calculator" class="px-4 pb-24">
  <div class="max-w-xl mx-auto bg-white rounded-[2.5rem] shadow-[0_40px_100px_rgba(0,0,0,0.06)] border border-white p-10 md:p-14">
      
      <div class="flex items-center gap-4 mb-12">
          <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <div>
              <h3 class="text-xl font-bold text-slate-900">Water Lab</h3>
              <p class="text-xs font-medium text-slate-400">Input your current test results</p>
          </div>
      </div>

      <div class="space-y-10">
        <div class="group">
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Pool Volume (Gallons)</label>
          <div class="flex items-center gap-4 bg-slate-50 rounded-2xl p-4 group-focus-within:bg-white group-focus-within:ring-2 group-focus-within:ring-blue-600 transition-all">
              <span class="text-xl">🏠</span>
              <input id="gallons" type="number" placeholder="15000" class="w-full bg-transparent text-2xl font-bold outline-none"/>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-8">
          <div class="group">
              <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 text-center">Current pH</label>
              <input id="ph" type="number" step="0.1" placeholder="8.0" class="w-full bg-slate-50 rounded-2xl p-5 text-2xl font-bold outline-none text-center group-focus-within:bg-white group-focus-within:ring-2 group-focus-within:ring-blue-600 transition-all"/>
          </div>
          <div class="group">
              <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 text-center">Alkalinity</label>
              <input id="ta" type="number" placeholder="95" class="w-full bg-slate-50 rounded-2xl p-5 text-2xl font-bold outline-none text-center group-focus-within:bg-white group-focus-within:ring-2 group-focus-within:ring-blue-600 transition-all"/>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-8 opacity-60 hover:opacity-100 transition-opacity">
            <div class="group text-center">
                <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Calcium</label>
                <input id="ch" type="number" placeholder="250" class="w-full bg-transparent border-b border-slate-200 py-2 text-lg font-bold outline-none text-center focus:border-blue-600 transition-all"/>
            </div>
            <div class="group text-center">
                <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">CYA</label>
                <input id="cya" type="number" placeholder="40" class="w-full bg-transparent border-b border-slate-200 py-2 text-lg font-bold outline-none text-center focus:border-blue-600 transition-all"/>
            </div>
        </div>

        <button onclick="calculateAdvanced()" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-bold text-lg shadow-xl shadow-slate-100 transition-all hover:bg-blue-700 flex items-center justify-center gap-3 active:scale-[0.98]">
          Get My Free Plan <span class="opacity-50">→</span>
        </button>

        <div class="flex justify-center gap-6 text-[10px] text-slate-400 font-bold">
            <span class="flex items-center gap-1.5">✅ Free</span>
            <span class="flex items-center gap-1.5">⏱ 30 Sec</span>
            <span class="flex items-center gap-1.5">🔒 No Spam</span>
        </div>

        <div id="results" class="empty:hidden mt-4 pt-10 border-t border-slate-50 space-y-6"></div>
      </div>
  </div>
</section>

<footer class="text-center pb-20 opacity-30 text-[10px] font-black uppercase tracking-[0.3em]">
  © 2026 PoolChem • Zebulon, NC
</footer>

<script>
function calculateAdvanced() {
  const vol = parseFloat(document.getElementById("gallons").value);
  const ph = parseFloat(document.getElementById("ph").value);
  const ta = parseFloat(document.getElementById("ta").value);
  const ch = parseFloat(document.getElementById("ch").value) || 250;
  const cya = parseFloat(document.getElementById("cya").value) || 40;

  if (!vol || !ph || !ta) { alert("Please fill in your primary readings."); return; }

  // PRO BACKEND MATH
  const correctedTA = ta - (cya * 0.33);
  const lsi = ph + 0.7 + Math.log10(ch) + Math.log10(correctedTA) - 12.1;
  
  let lsiStatus = "Balanced";
  let lsiColor = "bg-blue-600";
  if (lsi < -0.3) { lsiStatus = "Corrosive"; lsiColor = "bg-orange-600"; }
  if (lsi > 0.3) { lsiStatus = "Scaling"; lsiColor = "bg-purple-600"; }

  let html = `
    <div class="p-8 rounded-3xl bg-slate-900 text-white shadow-2xl">
      <div class="flex justify-between items-start mb-4">
        <div>
            <p class="text-[9px] font-black uppercase tracking-widest opacity-40 mb-1">Water Health Score (LSI)</p>
            <h3 class="text-4xl font-black">${lsi.toFixed(2)}</h3>
        </div>
        <span class="${lsiColor} text-white text-[9px] font-black px-3 py-1 rounded uppercase tracking-tighter">${lsiStatus}</span>
      </div>
      <p class="text-[11px] opacity-60 leading-relaxed">
        ${lsi < -0.3 ? "Your water is aggressive and may etch surfaces." : 
          lsi > 0.3 ? "Calcium scale buildup is likely at this level." : 
          "Perfectly balanced environment for swimmers and equipment."}
      </p>
    </div>
  `;

  // ACTIONS
  if (ph > 7.5) {
    let dose = (ph - 7.5) * 12 * (vol / 10000);
    html += createAction("Lower pH", `${dose.toFixed(1)} oz`, "Muriatic Acid (31%)");
  }
  if (ta < 80) {
      let dose = (100 - ta) * 1.5 * (vol / 10000);
      html += createAction("Raise Alkalinity", `${dose.toFixed(1)} lbs`, "Baking Soda");
  }

  document.getElementById("results").innerHTML = html;
  document.getElementById("results").scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function createAction(title, amt, chem) {
  return `
    <div class="p-8 rounded-3xl border border-slate-100 flex items-center justify-between group bg-white shadow-sm">
      <div class="max-w-[60%]">
        <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-1">${title}</p>
        <h4 class="text-3xl font-black text-slate-900">${amt}</h4>
        <p class="text-[10px] font-bold text-slate-400 mt-1 italic">${chem}</p>
      </div>
      <a href="#" class="text-[10px] font-black uppercase tracking-widest text-slate-300 group-hover:text-blue-600 transition-colors">
        View Pro Grade →
      </a>
    </div>
  `;
}
</script>

</body>
</html>
